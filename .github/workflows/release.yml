name: Create GitHub Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    # Skip automated commits (data updates & version bumps)
    if: >
      !contains(github.event.head_commit.message, 'chore: update portfolio data') &&
      !contains(github.event.head_commit.message, 'chore: bump version')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from config.json
        id: version
        run: |
          VERSION=$(jq -r '.version' config.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Current version in config.json: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag v${{ steps.version.outputs.version }} already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🆕 Tag v${{ steps.version.outputs.version }} is new — will create release."
          fi

      - name: Generate changelog
        id: changelog
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          # Get the latest existing tag (if any)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "📝 First release — collecting all commits."
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "📝 Generating changelog since $LATEST_TAG"
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|add|new)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|bug|patch|hotfix)" || true)
          CHORES=$(echo "$COMMITS" | grep -iE "^- (chore|ci|build|refactor|style|docs|test)" || true)
          OTHER=$(echo "$COMMITS" | grep -viE "^- (feat|add|new|fix|bug|patch|hotfix|chore|ci|build|refactor|style|docs|test)" || true)

          # Build release body
          BODY=""

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## ✨ Features\n${FEATURES}\n\n"
          fi

          if [ -n "$FIXES" ]; then
            BODY="${BODY}## 🐛 Bug Fixes\n${FIXES}\n\n"
          fi

          if [ -n "$CHORES" ]; then
            BODY="${BODY}## 🔧 Maintenance\n${CHORES}\n\n"
          fi

          if [ -n "$OTHER" ]; then
            BODY="${BODY}## 📝 Other Changes\n${OTHER}\n\n"
          fi

          if [ -z "$BODY" ]; then
            BODY="No notable changes in this release."
          fi

          # Write to file to preserve multiline content
          echo -e "$BODY" > release_notes.md
          echo "📄 Release notes generated."

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in config.json
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          CURRENT="${{ steps.version.outputs.version }}"

          # Split version into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          # Update config.json using jq
          jq --arg v "$NEW_VERSION" '.version = $v' config.json > config.tmp && mv config.tmp config.json

          echo "🔄 Bumped version: $CURRENT → $NEW_VERSION"

      - name: Commit version bump
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add config.json
          git commit -m "chore: bump version to $(jq -r '.version' config.json)"
          git push

      - name: Summary
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          NEW_VERSION=$(jq -r '.version' config.json)
          echo "### 🚀 Release Created!" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Released:** ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next version:** v${NEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
